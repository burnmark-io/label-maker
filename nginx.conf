server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — vue-router uses HTML5 history mode.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Service worker must never be cached so updates take effect on next visit.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  # Hashed assets are immutable — long cache.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
